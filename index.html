<body>
<div id="root"></div>

<script type="text/babel" src="responsive.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="SiteHeader.jsx"></script>
<script type="text/babel" src="SiteHero.jsx"></script>
<script type="text/babel" src="SiteSections.jsx"></script>
<script type="text/babel" src="SiteServices.jsx"></script>
<script type="text/babel" src="SiteIndustries.jsx"></script>
<script type="text/babel" src="SiteLocations.jsx"></script>
<script type="text/babel" src="SiteContact.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── Sticky Quote Button ─────────────────────────────────── */
const StickyQuoteBtn = ({ onNavigate }) => {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const h = () => setVisible(window.scrollY > 400);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  return (
    <button onClick={() => onNavigate('contact')} style={{
      position: 'fixed', bottom: 28, right: 28, zIndex: 900,
      background: '#006090', color: '#fff',
      fontFamily: "'Barlow', sans-serif", fontSize: 14, fontWeight: 700,
      padding: '12px 22px', borderRadius: 9999, border: 'none', cursor: 'pointer',
      display: 'flex', alignItems: 'center', gap: 8,
      boxShadow: '0 6px 24px rgba(0,96,144,0.45)',
      transform: visible ? 'translateY(0) scale(1)' : 'translateY(80px) scale(0.9)',
      opacity: visible ? 1 : 0,
      transition: 'all 0.25s cubic-bezier(0.34,1.56,0.64,1)',
      pointerEvents: visible ? 'all' : 'none',
    }}>
      <i data-lucide="phone" style={{ width: 15, height: 15 }}></i>
      Get a Free Quote
    </button>
  );
};

/* ─── Home Page ───────────────────────────────────────────── */
const HomePage = ({ onNavigate, direction }) => (
  <>
    <SiteHero onNavigate={onNavigate} direction={direction} />
    <TrustBar direction={direction} />
    <ServicesSection onNavigate={onNavigate} direction={direction} />
    <IndustriesStrip onNavigate={onNavigate} direction={direction} />
    <TechSection direction={direction} />
    <AboutSection direction={direction} onNavigate={onNavigate} />
    <CTAStrip onNavigate={onNavigate} />
  </>
);

/* ─── Main App ────────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "direction": "command",
  "showPhoneInHeader": true
}/*EDITMODE-END*/;

const App = () => {
  const [page, setPage] = useState(() => localStorage.getItem('fpi_page') || 'home');
  const [tweaks, setTweaks] = useTweaks(TWEAK_DEFAULTS);
  const direction = tweaks.direction;

  const navigate = (p) => {
    setPage(p);
    localStorage.setItem('fpi_page', p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
  });

  // Update meta title per page for SEO
  useEffect(() => {
    const titles = {
      home: 'FPI Security Services | South Florida & Dallas, TX',
      services: 'Security Services | FPI Security',
      industries: 'Industries We Serve | FPI Security',
      locations: 'Our Locations | South Florida & Dallas | FPI Security',
      contact: 'Request a Free Consultation | FPI Security',
      about: 'About FPI Security Services',
    };
    const serviceMatch = page.match(/^service-(.+)/);
    if (serviceMatch) {
      const svc = SERVICES_DATA.find(s => s.id === serviceMatch[1]);
      document.title = svc ? `${svc.title} | FPI Security Services` : titles.services;
    } else {
      document.title = titles[page] || titles.home;
    }
  }, [page]);

  const renderPage = () => {
    const serviceMatch = page.match(/^service-(.+)/);
    if (serviceMatch) return <ServiceDetailPage serviceId={serviceMatch[1]} onNavigate={navigate} />;
    switch (page) {
      case 'services':  return <ServicesPage onNavigate={navigate} />;
      case 'industries': return <IndustriesPage onNavigate={navigate} />;
      case 'locations': return <LocationsPage onNavigate={navigate} />;
      case 'contact':   return <SiteContact onNavigate={navigate} />;
      case 'about':     return <AboutPage onNavigate={navigate} />;
      default:          return <HomePage onNavigate={navigate} direction={direction} />;
    }
  };

  return (
    <div>
      <SiteHeader activePage={page} onNavigate={navigate} direction={direction} />
      {renderPage()}
      {page !== 'contact' && page !== 'about' && <SiteFooter onNavigate={navigate} />}
      <StickyQuoteBtn onNavigate={navigate} />

      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks}>
        <TweakSection title="Visual Direction">
          <TweakRadio
            tweakKey="direction"
            label="Design Direction"
            options={[
              { label: 'Command (dark, bold)', value: 'command' },
              { label: 'Clarity (light, modern)', value: 'clarity' },
            ]}
          />
        </TweakSection>
        <TweakSection title="Quick Preview">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {['home', 'services', 'industries', 'locations', 'contact'].map(p => (
              <button key={p} onClick={() => navigate(p)} style={{
                background: page === p ? '#006090' : 'rgba(255,255,255,0.08)',
                border: 'none', borderRadius: 4, cursor: 'pointer',
                color: page === p ? '#fff' : 'rgba(255,255,255,0.7)',
                fontFamily: "'Barlow', sans-serif", fontSize: 13, fontWeight: 600,
                padding: '8px 12px', textAlign: 'left', textTransform: 'capitalize',
                transition: 'background 0.15s',
              }}>{p}</button>
            ))}
          </div>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
